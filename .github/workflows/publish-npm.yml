name: Publish to npm

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test

      # OIDC trusted publishing -- no NPM_TOKEN needed.
      # Each package must have trusted publisher configured on npmjs.com:
      # Settings > Trusted Publisher > GitHub Actions:
      #   org=InfiniteRoomLabs, repo=claudesync, workflow=publish-npm.yml
      - name: Publish @infinite-room-labs/claudesync-core
        run: pnpm --filter @infinite-room-labs/claudesync-core publish --no-git-checks --access public

      - name: Publish @infinite-room-labs/claudesync-mcp-server
        run: pnpm --filter @infinite-room-labs/claudesync-mcp-server publish --no-git-checks --access public

      - name: Publish @infinite-room-labs/claudesync-cli
        run: pnpm --filter @infinite-room-labs/claudesync-cli publish --no-git-checks --access public
